name: E2E (layout shell)

# Runs only when something that can affect the global layout shell changes —
# not on every frontend edit. Keeps the Playwright browser download off the
# critical path for unrelated work while still guarding the layout contract.
on:
  push:
    paths:
      - 'frontend/src/App.vue'
      - 'frontend/src/components/layout/**'
      - 'frontend/src/components/MyanmarLyrics.vue'
      - 'frontend/src/components/BibleReader.vue'
      - 'frontend/src/styles.css'
      - 'frontend/e2e/**'
      - 'frontend/playwright.config.js'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'frontend/src/App.vue'
      - 'frontend/src/components/layout/**'
      - 'frontend/src/components/MyanmarLyrics.vue'
      - 'frontend/src/components/BibleReader.vue'
      - 'frontend/src/styles.css'
      - 'frontend/e2e/**'
      - 'frontend/playwright.config.js'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/e2e.yml'

jobs:
  layout-smoke:
    name: Layout-shell smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E layout-shell smoke
        run: npm run test:e2e
