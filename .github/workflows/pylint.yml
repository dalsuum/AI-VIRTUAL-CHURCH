name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        # Install stubs / lightweight versions so pylint can resolve imports.
        # Heavy GPU deps (torch, transformers) are excluded to keep CI fast;
        # import-error for those is suppressed below.
        pip install \
          celery[redis] redis requests httpx \
          anthropic boto3 fastapi uvicorn edge-tts \
          python-multipart || true
    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py') \
          --disable=E0401 \
          --fail-under=7.0
