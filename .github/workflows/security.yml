name: Security

# Ongoing supply-chain + secret assurance across all three ecosystems (PHP / JS / Python).
# These are guardrails, not gates for known issues — they catch dependency regressions and
# accidental credential commits before they reach main.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  composer-audit:
    name: PHP deps (composer audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Audit
        run: composer audit --no-interaction

  npm-audit:
    name: JS deps (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Production deps only — dev tooling vulns don't ship to users. Fail on high+.
      - run: npm audit --omit=dev --audit-level=high

  pip-audit:
    name: Python deps (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pip-audit
      - name: Audit requirements
        # Ignored advisories have no fix compatible with our pinned major:
        #   PYSEC-2025-217  transformers — no fixed release exists yet.
        #   CVE-2026-1839   transformers — only fixed in 5.x; we pin <5 to protect
        #                   the MMS-TTS narrator stack (torch/transformers 4.x).
        run: >-
          pip-audit -r requirements.txt
          --ignore-vuln PYSEC-2025-217
          --ignore-vuln CVE-2026-1839

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan the whole range
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
