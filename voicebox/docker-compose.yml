services:
  voicebox:
    image: ghcr.io/jamiepine/voicebox:latest
    container_name: voicebox
    restart: unless-stopped
    ports:
      - "127.0.0.1:17493:8000"
    volumes:
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface
    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - VOICEBOX_BACKEND_VARIANT=cpu
      - VOICEBOX_CORS_ORIGINS=https://voicebox.aivirtual.church
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

volumes:
  voicebox-data:
  huggingface-cache:
